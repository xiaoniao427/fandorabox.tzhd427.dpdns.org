name = "fandorabox"
main = "workers.js" #主要入口，不要动
compatibility_date = "2026-02-26"

# 变量
[vars]
ORIGIN_HOST = "https://fandorabox.net"
#OFFLINE_MODE = "false"  # 设为 "true" 启用离线模拟（测试用，生产环境不要启用）
#SYNC_PASSWORD = "your-secure-password"   # 替换为实际密码（不要直接在仓库里填，同步到cloudflare_worker后在worker里填）

# KV绑定
[[kv_namespaces]]
binding = "USER_DATA"
id = "7b744239d2454e68b5e96b8db2728db2"   # fork后替换为自己的ID

[[kv_namespaces]]
binding = "SESSIONS"
id = "890e0c48c5984f35b368a2a54cd6bddf"   # fork后替换为自己的ID

[[kv_namespaces]]
binding = "PENDING_SCORES"
id = "7e615ab15b564d1ca5bbf0de5e239453"   # fork后替换为自己的ID

[[kv_namespaces]]
binding = "MACHINE_SESSIONS"
id = "47f3995ff8e5421198af81047f840aca"   # 替换为实际 ID

[[kv_namespaces]]
binding = "OAUTH_SESSIONS"
id = "d1230ea023c54d92b9580f95b76c5d9a"   # 替换为实际 ID

# 同步有bug，修好再动
# [triggers]
# crons = ["*/30 * * * *"]  # 每30分钟尝试同步一次（可修改，不建议频率调太短或太长，太短会导致原站负载增加，太长会导致CPU时钟超过免费用量自动终止）

# 下面这些都是日志有关的，生产环境用不上
[observability]
[observability.logs]
enabled = false
invocation_logs = false

[observability.traces]
enabled = false
